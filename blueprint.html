<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blueprint: Round Stool with Four Legs</title>
<style>
  :root {
    /* All dimensions in mm */
    --seat-diameter: 100;
    --seat-radius: 50;
    --seat-thickness: 8;
    --overall-height: 95;
    --leg-height: 87;
    --leg-diameter: 7;
    --leg-radius: 3.5;
    --leg-spread-radius: 35;
    --leg-splay-angle: 5;
    --foot-spread-radius: 42.6;
    --leg-spacing-angle: 90;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    color: #1a1a1a;
    padding: 20px;
  }

  h2 {
    text-align: center;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 6px;
    color: #111;
  }

  .subtitle {
    text-align: center;
    font-size: 13px;
    color: #555;
    margin-bottom: 24px;
    letter-spacing: 0.5px;
  }

  .views {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto 20px auto;
  }

  .view-container {
    background: #fafafa;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 10px;
    text-align: center;
  }

  .view-container h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #444;
    margin-bottom: 6px;
  }

  svg {
    display: block;
    margin: 0 auto;
  }

  /* Engineering drawing styles */
  .outline { stroke: #1a1a1a; stroke-width: 1.8; fill: none; }
  .hidden { stroke: #1a1a1a; stroke-width: 0.8; fill: none; stroke-dasharray: 6,3; }
  .center-line { stroke: #888; stroke-width: 0.5; fill: none; stroke-dasharray: 12,3,3,3; }
  .dim-line { stroke: #1565C0; stroke-width: 0.7; fill: none; }
  .dim-ext { stroke: #1565C0; stroke-width: 0.5; fill: none; }
  .dim-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #1565C0; text-anchor: middle; font-weight: 500; }
  .dim-text-left { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #1565C0; text-anchor: end; font-weight: 500; }
  .dim-text-right { font-family: 'Segoe UI', Arial, sans-serif; font-size: 10px; fill: #1565C0; text-anchor: start; font-weight: 500; }
  .label-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 9px; fill: #888; text-anchor: middle; }
  .fill-light { fill: #f0f0f0; stroke: none; }

  .title-block {
    max-width: 1100px;
    margin: 0 auto;
    border: 2px solid #333;
    border-radius: 2px;
    padding: 10px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    color: #444;
  }

  .title-block .left { font-weight: 600; }
  .title-block .right { text-align: right; color: #777; }
</style>
</head>
<body>

<h2>Blueprint: Round Stool with Four Legs</h2>
<p class="subtitle">Orthographic Projection &mdash; Third Angle</p>

<div class="views">

  <!-- ============== FRONT VIEW ============== -->
  <div class="view-container">
    <h3>Front View</h3>
    <svg width="380" height="340" viewBox="0 0 380 340">
      <defs>
        <marker id="arrow-f" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#1565C0"/>
        </marker>
        <marker id="arrow-f-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
          <path d="M8,0 L0,3 L8,6 Z" fill="#1565C0"/>
        </marker>
      </defs>

      <!-- Center line -->
      <line x1="190" y1="30" x2="190" y2="310" class="center-line"/>

      <!-- Seat (rectangle in front view) -->
      <!-- Seat is 100mm wide, 8mm thick. Scale: 2.5px per mm -->
      <!-- Seat center at x=190, top at y=60, bottom at y=80 -->
      <rect x="65" y="60" width="250" height="20" class="outline" rx="2"/>
      <rect x="65" y="60" width="250" height="20" class="fill-light"/>
      <rect x="65" y="60" width="250" height="20" class="outline" rx="2"/>

      <!-- Legs: 4 legs, front view shows 2 front legs and 2 back legs (hidden) -->
      <!-- Left front leg: top at (190-35*2.5, 80) = (102.5, 80), splays outward -->
      <!-- At floor: (190-42.6*2.5, 80+87*2.5) = (83.5, 297.5) -->
      <!-- Leg width = 7*2.5 = 17.5px -->

      <!-- Left front leg -->
      <polygon points="94.25,80 111.75,80 101.25,297.5 83.75,297.5" class="outline"/>
      <polygon points="94.25,80 111.75,80 101.25,297.5 83.75,297.5" class="fill-light"/>
      <polygon points="94.25,80 111.75,80 101.25,297.5 83.75,297.5" class="outline"/>

      <!-- Right front leg -->
      <polygon points="268.25,80 285.75,80 296.25,297.5 278.75,297.5" class="outline"/>
      <polygon points="268.25,80 285.75,80 296.25,297.5 278.75,297.5" class="fill-light"/>
      <polygon points="268.25,80 285.75,80 296.25,297.5 278.75,297.5" class="outline"/>

      <!-- Back legs (hidden lines - directly behind front legs in this view) -->
      <line x1="103" y1="80" x2="92.5" y2="297.5" class="hidden"/>
      <line x1="111" y1="80" x2="101" y2="297.5" class="hidden"/>
      <line x1="269" y1="80" x2="279" y2="297.5" class="hidden"/>
      <line x1="277" y1="80" x2="287.5" y2="297.5" class="hidden"/>

      <!-- ===== DIMENSION LINES ===== -->

      <!-- Overall height: right side -->
      <line x1="325" y1="60" x2="340" y2="60" class="dim-ext"/>
      <line x1="325" y1="297.5" x2="340" y2="297.5" class="dim-ext"/>
      <line x1="335" y1="60" x2="335" y2="297.5" class="dim-line" marker-start="url(#arrow-f-rev)" marker-end="url(#arrow-f)"/>
      <text x="352" y="182" class="dim-text-right" transform="rotate(90,352,182)">overall_height: 95mm</text>

      <!-- Seat thickness: far right -->
      <line x1="316" y1="60" x2="325" y2="60" class="dim-ext"/>
      <line x1="316" y1="80" x2="325" y2="80" class="dim-ext"/>
      <line x1="322" y1="60" x2="322" y2="80" class="dim-line" marker-start="url(#arrow-f-rev)" marker-end="url(#arrow-f)"/>
      <text x="318" y="50" class="dim-text">8mm</text>

      <!-- Seat diameter: top -->
      <line x1="65" y1="45" x2="65" y2="55" class="dim-ext"/>
      <line x1="315" y1="45" x2="315" y2="55" class="dim-ext"/>
      <line x1="65" y1="48" x2="315" y2="48" class="dim-line" marker-start="url(#arrow-f-rev)" marker-end="url(#arrow-f)"/>
      <text x="190" y="43" class="dim-text">seat_diameter: 100mm</text>

      <!-- Leg spread at seat: bottom of seat level -->
      <line x1="103" y1="84" x2="103" y2="94" class="dim-ext"/>
      <line x1="277" y1="84" x2="277" y2="94" class="dim-ext"/>
      <line x1="103" y1="90" x2="277" y2="90" class="dim-line" marker-start="url(#arrow-f-rev)" marker-end="url(#arrow-f)"/>
      <text x="190" y="102" class="dim-text">leg_spread: 2 &times; 35 = 70mm</text>

      <!-- Foot spread at floor -->
      <line x1="92.5" y1="302" x2="92.5" y2="316" class="dim-ext"/>
      <line x1="287.5" y1="302" x2="287.5" y2="316" class="dim-ext"/>
      <line x1="92.5" y1="312" x2="287.5" y2="312" class="dim-line" marker-start="url(#arrow-f-rev)" marker-end="url(#arrow-f)"/>
      <text x="190" y="327" class="dim-text">foot_spread: 2 &times; 42.6 = 85.2mm</text>

      <!-- Leg diameter label -->
      <line x1="60" y1="185" x2="94" y2="185" class="dim-ext"/>
      <line x1="60" y1="185" x2="60" y2="185" class="dim-ext"/>
      <text x="42" y="183" class="dim-text" style="font-size:9px;">leg &oslash;7mm</text>
    </svg>
  </div>

  <!-- ============== SIDE VIEW ============== -->
  <div class="view-container">
    <h3>Side View</h3>
    <svg width="380" height="340" viewBox="0 0 380 340">
      <defs>
        <marker id="arrow-s" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#1565C0"/>
        </marker>
        <marker id="arrow-s-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
          <path d="M8,0 L0,3 L8,6 Z" fill="#1565C0"/>
        </marker>
      </defs>

      <!-- Center line -->
      <line x1="190" y1="30" x2="190" y2="310" class="center-line"/>

      <!-- Seat -->
      <rect x="65" y="60" width="250" height="20" class="fill-light"/>
      <rect x="65" y="60" width="250" height="20" class="outline" rx="2"/>

      <!-- Side view: we see 2 legs (left pair merges, right pair merges) -->
      <!-- In side view rotated 90°, the two left legs are at same depth, two right legs same -->
      <!-- Left leg pair -->
      <polygon points="94.25,80 111.75,80 101.25,297.5 83.75,297.5" class="outline"/>
      <polygon points="94.25,80 111.75,80 101.25,297.5 83.75,297.5" class="fill-light"/>
      <polygon points="94.25,80 111.75,80 101.25,297.5 83.75,297.5" class="outline"/>

      <!-- Right leg pair -->
      <polygon points="268.25,80 285.75,80 296.25,297.5 278.75,297.5" class="outline"/>
      <polygon points="268.25,80 285.75,80 296.25,297.5 278.75,297.5" class="fill-light"/>
      <polygon points="268.25,80 285.75,80 296.25,297.5 278.75,297.5" class="outline"/>

      <!-- Hidden lines for rear legs -->
      <line x1="103" y1="80" x2="92.5" y2="297.5" class="hidden"/>
      <line x1="111" y1="80" x2="101" y2="297.5" class="hidden"/>
      <line x1="269" y1="80" x2="279" y2="297.5" class="hidden"/>
      <line x1="277" y1="80" x2="287.5" y2="297.5" class="hidden"/>

      <!-- ===== DIMENSION LINES ===== -->

      <!-- Leg height: left side -->
      <line x1="45" y1="80" x2="60" y2="80" class="dim-ext"/>
      <line x1="45" y1="297.5" x2="60" y2="297.5" class="dim-ext"/>
      <line x1="50" y1="80" x2="50" y2="297.5" class="dim-line" marker-start="url(#arrow-s-rev)" marker-end="url(#arrow-s)"/>
      <text x="37" y="192" class="dim-text" transform="rotate(-90,37,192)">leg_height: 87mm</text>

      <!-- Splay angle indicator -->
      <!-- Vertical reference from top of left leg -->
      <line x1="103" y1="80" x2="103" y2="200" class="center-line"/>
      <!-- Actual leg line is already drawn -->
      <!-- Angle arc -->
      <path d="M103,150 A70,70 0 0,0 97,150" class="dim-line" fill="none"/>
      <text x="78" y="148" class="dim-text" style="font-size:9px;">5&deg; splay</text>

      <!-- Seat diameter (depth direction) -->
      <line x1="65" y1="45" x2="65" y2="55" class="dim-ext"/>
      <line x1="315" y1="45" x2="315" y2="55" class="dim-ext"/>
      <line x1="65" y1="48" x2="315" y2="48" class="dim-line" marker-start="url(#arrow-s-rev)" marker-end="url(#arrow-s)"/>
      <text x="190" y="43" class="dim-text">seat_diameter: 100mm</text>

      <!-- Leg diameter label -->
      <text x="190" y="195" class="dim-text" style="font-size:9px;">leg_diameter: 7mm</text>
    </svg>
  </div>

  <!-- ============== TOP VIEW ============== -->
  <div class="view-container">
    <h3>Top View</h3>
    <svg width="380" height="340" viewBox="0 0 380 340">
      <defs>
        <marker id="arrow-t" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
          <path d="M0,0 L8,3 L0,6 Z" fill="#1565C0"/>
        </marker>
        <marker id="arrow-t-rev" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
          <path d="M8,0 L0,3 L8,6 Z" fill="#1565C0"/>
        </marker>
      </defs>

      <!-- Seat circle: diameter 100mm * 2.5 = 250px, center at (190, 170) -->
      <circle cx="190" cy="170" r="125" class="fill-light"/>
      <circle cx="190" cy="170" r="125" class="outline"/>

      <!-- Center lines -->
      <line x1="40" y1="170" x2="340" y2="170" class="center-line"/>
      <line x1="190" y1="20" x2="190" y2="320" class="center-line"/>

      <!-- Leg positions (hidden, visible through seat) -->
      <!-- 4 legs at 45°, 135°, 225°, 315° from center at radius 35*2.5=87.5px -->
      <!-- Leg 1: 45° → (190+61.9, 170-61.9) = (251.9, 108.1) -->
      <!-- Leg 2: 135° → (190-61.9, 170-61.9) = (128.1, 108.1) -->
      <!-- Leg 3: 225° → (190-61.9, 170+61.9) = (128.1, 231.9) -->
      <!-- Leg 4: 315° → (190+61.9, 170+61.9) = (251.9, 231.9) -->

      <!-- Leg circles (hidden - below seat) -->
      <circle cx="251.9" cy="108.1" r="8.75" class="hidden"/>
      <circle cx="128.1" cy="108.1" r="8.75" class="hidden"/>
      <circle cx="128.1" cy="231.9" r="8.75" class="hidden"/>
      <circle cx="251.9" cy="231.9" r="8.75" class="hidden"/>

      <!-- Leg center marks -->
      <line x1="248" y1="108.1" x2="255.8" y2="108.1" class="center-line"/>
      <line x1="251.9" y1="104.2" x2="251.9" y2="112" class="center-line"/>

      <line x1="124.2" y1="108.1" x2="132" y2="108.1" class="center-line"/>
      <line x1="128.1" y1="104.2" x2="128.1" y2="112" class="center-line"/>

      <line x1="124.2" y1="231.9" x2="132" y2="231.9" class="center-line"/>
      <line x1="128.1" y1="228" x2="128.1" y2="235.8" class="center-line"/>

      <line x1="248" y1="231.9" x2="255.8" y2="231.9" class="center-line"/>
      <line x1="251.9" y1="228" x2="251.9" y2="235.8" class="center-line"/>

      <!-- ===== DIMENSION LINES ===== -->

      <!-- Seat diameter horizontal -->
      <line x1="65" y1="25" x2="65" y2="40" class="dim-ext"/>
      <line x1="315" y1="25" x2="315" y2="40" class="dim-ext"/>
      <line x1="65" y1="32" x2="315" y2="32" class="dim-line" marker-start="url(#arrow-t-rev)" marker-end="url(#arrow-t)"/>
      <text x="190" y="27" class="dim-text">seat_diameter: 100mm</text>

      <!-- Leg spread radius: center to leg -->
      <line x1="190" y1="170" x2="251.9" y2="108.1" class="dim-line" marker-end="url(#arrow-t)"/>
      <text x="232" y="132" class="dim-text-right" style="font-size:9px;">leg_spread_radius: 35mm</text>

      <!-- 90° angle between legs -->
      <path d="M225,145 A50,50 0 0,1 225,195" class="dim-line" fill="none"/>
      <text x="240" y="173" class="dim-text-right" style="font-size:9px;">90&deg;</text>

      <!-- Leg diameter callout -->
      <line x1="128.1" y1="231.9" x2="55" y2="290" class="dim-line"/>
      <text x="52" y="304" class="dim-text" style="font-size:9px;">leg &oslash;7mm</text>
    </svg>
  </div>

  <!-- ============== ISOMETRIC VIEW ============== -->
  <div class="view-container">
    <h3>Isometric View</h3>
    <svg width="380" height="340" viewBox="0 0 380 340">

      <!-- Isometric seat (ellipse to represent the round top) -->
      <!-- Using a simple isometric approximation -->
      <ellipse cx="190" cy="80" rx="120" ry="50" class="fill-light"/>
      <ellipse cx="190" cy="80" rx="120" ry="50" class="outline"/>

      <!-- Seat thickness - bottom ellipse (partially hidden) -->
      <path d="M70,88 A120,50 0 0,0 310,88" class="outline" fill="none"/>
      <line x1="70" y1="80" x2="70" y2="88" class="outline"/>
      <line x1="310" y1="80" x2="310" y2="88" class="outline"/>
      <!-- Hidden back part of bottom ellipse -->
      <path d="M70,88 A120,50 0 0,1 310,88" class="hidden" fill="none"/>

      <!-- Legs in isometric -->
      <!-- Front-left leg -->
      <line x1="127" y1="95" x2="115" y2="295" class="outline" stroke-width="1.8"/>
      <line x1="134" y1="95" x2="122" y2="295" class="outline" stroke-width="1.8"/>
      <ellipse cx="118.5" cy="295" rx="3.5" ry="1.5" class="outline"/>

      <!-- Front-right leg -->
      <line x1="246" y1="95" x2="258" y2="295" class="outline" stroke-width="1.8"/>
      <line x1="253" y1="95" x2="265" y2="295" class="outline" stroke-width="1.8"/>
      <ellipse cx="261.5" cy="295" rx="3.5" ry="1.5" class="outline"/>

      <!-- Back-left leg (partially hidden) -->
      <line x1="140" y1="68" x2="128" y2="268" class="hidden"/>
      <line x1="147" y1="68" x2="135" y2="268" class="hidden"/>

      <!-- Back-right leg (partially hidden) -->
      <line x1="233" y1="68" x2="245" y2="268" class="hidden"/>
      <line x1="240" y1="68" x2="252" y2="268" class="hidden"/>

      <!-- Axis labels -->
      <text x="190" y="20" class="label-text" style="font-size:11px; fill:#999;">Isometric (illustrative)</text>

      <!-- Key dimensions as notes -->
      <text x="190" y="328" class="dim-text" style="font-size:10px;">4 legs &bull; 90&deg; spacing &bull; 5&deg; splay</text>
    </svg>
  </div>

</div>

<!-- Title Block -->
<div class="title-block">
  <div class="left">
    ROUND STOOL WITH FOUR LEGS &mdash; Technical Blueprint
  </div>
  <div class="right">
    Dimensions in mm &nbsp;|&nbsp; Scale: not to scale &nbsp;|&nbsp; Projection: Third Angle &nbsp;|&nbsp; Date: 2026-02-15
  </div>
</div>

</body>
</html>
